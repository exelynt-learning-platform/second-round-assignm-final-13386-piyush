spring:
  application:
    name: ecommerce-backend
  datasource:
    url: jdbc:h2:mem:ecommerce_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-very-long-random-secret-key-at-least-64-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  seed:
    admin-email: ${APP_SEED_ADMIN_EMAIL:}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    com.ecommerce.backend: INFO
